<div style="font-family:Arial,sans-serif;max-width:560px;margin:0 auto;padding:24px;color:#1f2937;">
  <h2 style="margin-bottom:16px;">Welcome to Vitality Institute</h2>

  <p style="margin-bottom:16px;">
    Your account has been created. Please confirm your email address to complete your sign up.
  </p>

  <p style="margin-bottom:24px;">
    <a
      href="{{ .ConfirmationURL }}"
      style="display:inline-block;padding:12px 20px;background:#7c3aed;color:#ffffff;text-decoration:none;border-radius:8px;font-weight:600;"
    >
      Confirm Email
    </a>
  </p>

  <p style="margin-bottom:8px;">If the button does not work, use this link:</p>
  <p style="word-break:break-all;">{{ .ConfirmationURL }}</p>

  <p style="margin-top:24px;font-size:12px;color:#6b7280;">
    If you did not create this account, you can ignore this email.
  </p>
</div>
